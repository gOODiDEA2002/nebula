# ======================================================================
# Nebula 数据访问三种场景并存配置示例
# 使用方式：spring.profiles.active=dev,combined
# 
# 场景说明：
# 1. 用户表（t_user）      -> 使用 primary 数据源，普通数据访问
# 2. 产品表（t_product）   -> 使用 master/slave 数据源，读写分离访问
# 3. 订单表（t_order）     -> 使用 ds0/ds1 数据源，分片访问
# ======================================================================

spring:
  config:
    activate:
      on-profile: combined
  
  # 禁用默认数据源自动配置（分片数据源优先级最高）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# ======================================================================
# Nebula 数据持久层配置
# ======================================================================
nebula:
  data:
    persistence:
      enabled: true
      
      # ----------------------------------------------------------------
      # 数据源配置 - 定义所有需要的数据源
      # ----------------------------------------------------------------
      sources:
        # 1. 普通数据源（用于用户表等非分片、非读写分离的表）
        primary:
          type: mysql
          url: jdbc:mysql://localhost:3306/nebula_example?useUnicode=true&characterEncoding=utf-8&useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          username: root
          password: root
          pool:
            min-size: 5
            max-size: 20
            connection-timeout: 30s
            idle-timeout: 10m
            max-lifetime: 30m
        
        # 2. 读写分离数据源（用于产品表）
        master:
          type: mysql
          url: jdbc:mysql://localhost:3306/nebula_example?useUnicode=true&characterEncoding=utf-8&useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          username: root
          password: root
          pool:
            min-size: 5
            max-size: 20
            connection-timeout: 30s
            idle-timeout: 10m
            max-lifetime: 30m
        
        slave01:
          type: mysql
          url: jdbc:mysql://localhost:3306/nebula_example?useUnicode=true&characterEncoding=utf-8&useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          username: root
          password: root
          pool:
            min-size: 5
            max-size: 20
            connection-timeout: 30s
            idle-timeout: 10m
            max-lifetime: 30m
        
        # 3. 分片数据源（用于订单表）
        ds0:
          type: mysql
          url: jdbc:mysql://localhost:3306/nebula_sharding_0?useUnicode=true&characterEncoding=utf-8&useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          username: root
          password: root
          pool:
            min-size: 5
            max-size: 20
            connection-timeout: 30s
            idle-timeout: 10m
            max-lifetime: 30m
        
        ds1:
          type: mysql
          url: jdbc:mysql://localhost:3306/nebula_sharding_1?useUnicode=true&characterEncoding=utf-8&useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          username: root
          password: root
          pool:
            min-size: 5
            max-size: 20
            connection-timeout: 30s
            idle-timeout: 10m
            max-lifetime: 30m
    
    # ----------------------------------------------------------------
    # 读写分离配置（用于产品表）
    # 注意：dynamic-routing = false，因为分片数据源优先级更高
    # ----------------------------------------------------------------
    read-write-separation:
      enabled: true
      dynamic-routing: false      # 不作为主数据源（分片优先）
      aspect-enabled: true         # 启用切面，通过注解控制读写分离
      clusters:
        # 产品表的读写分离集群
        product-cluster:
          enabled: true
          master: master           # 主库（写）
          slaves: [slave01]        # 从库（读）
          load-balance-strategy: ROUND_ROBIN
          force-write-on-master: true
    
    # ----------------------------------------------------------------
    # 分片配置（用于订单表）- 优先级最高，作为主数据源
    # ----------------------------------------------------------------
    sharding:
      enabled: true
      
      schemas:
        default:
          # 分片使用的数据源列表
          data-sources: [ds0, ds1]
          
          # 表分片配置
          tables:
            # 订单表分片配置（按用户ID分库，按订单ID分表）
            - logic-table: t_order
              actual-data-nodes: ds${0..1}.t_order_${0..1}
              
              # 数据库分片策略（按用户ID取模）
              database-sharding-config:
                sharding-column: user_id
                algorithm-name: database-user-mod
                algorithm-expression: ds${user_id % 2}
              
              # 表分片策略（按订单ID取模）
              table-sharding-config:
                sharding-column: id
                algorithm-name: table-order-mod
                algorithm-expression: t_order_${id % 2}
              
              # 主键生成策略（雪花算法）
              key-generate-config:
                column: id
                algorithm-name: snowflake

# ======================================================================
# MyBatis-Plus 配置
# ======================================================================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id          # 使用 MyBatis-Plus 雪花算法
      table-underline: true
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: io.nebula.example.modules.data.entity.dos

# ======================================================================
# 日志配置
# ======================================================================
logging:
  level:
    # Nebula 框架日志
    io.nebula.data.persistence: DEBUG
    io.nebula.data.persistence.datasource: DEBUG
    io.nebula.data.persistence.sharding: DEBUG
    io.nebula.data.persistence.readwrite: DEBUG
    
    # ShardingSphere 日志
    org.apache.shardingsphere: INFO
    org.apache.shardingsphere.infra.route: DEBUG
    org.apache.shardingsphere.sharding.route: DEBUG
    
    # MyBatis-Plus 日志
    com.baomidou.mybatisplus: DEBUG

# ======================================================================
# 使用说明
# ======================================================================
# 
# 1. 用户表（t_user）- 普通数据访问
#    - 不使用任何注解
#    - 自动使用 primary 数据源（通过 ShardingSphere 路由，实际使用ds0或ds1）
#    - 示例：userService.save(user)
#
# 2. 产品表（t_product）- 读写分离访问
#    - 使用 @ReadDataSource 或 @WriteDataSource 注解
#    - 读操作路由到 slave01，写操作路由到 master
#    - 示例：
#      @ReadDataSource(cluster = "product-cluster")
#      public Product getProduct(Long id) { ... }
#      
#      @WriteDataSource(cluster = "product-cluster")
#      public void saveProduct(Product product) { ... }
#
# 3. 订单表（t_order）- 分片访问
#    - 不需要注解，ShardingSphere 自动路由
#    - 根据 user_id 分库（ds0/ds1）
#    - 根据 order_id 分表（t_order_0/t_order_1）
#    - 示例：orderService.save(order)
#
# 数据源优先级：分片 > 读写分离 > 普通
# ======================================================================
